name: Validate PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Continuous Integration
    if: github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify changeset is present
        if: |
          github.head_ref != 'changeset-release/main' &&
          (startsWith(github.head_ref, 'feature/') || startsWith(github.head_ref, 'fix/'))
        run: |
          if [ -z "$(ls .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            echo "No changeset found. Run 'npx changeset' before opening a PR."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Unit test with coverage
        run: npm run test:coverage

      - name: Smoke-test
        run: npm run smoke

      - name: Build
        run: npm run build

      - name: Resolve package version
        id: package_version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Scan with SonarCloud
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        with:
          args: >
            -Dsonar.projectVersion=${{ steps.package_version.outputs.version }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Tag release
        if: startsWith(github.head_ref, 'release/')
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag "v$VERSION"
          git push origin "v$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
