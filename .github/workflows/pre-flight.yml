name: Pre-flight

run-name: "Validate Branch: ${{ github.event.head_commit.message }}"

on:
  push:
    branches:
      - chore/**
      - feature/**
      - fix/**
      - docs/**

concurrency:
  group: pre-flight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Validate Branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Unit Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke-test
        run: npm run smoke
