name: Create Issue Branch & Draft PR
on:
  issues:
    types: [assigned]

jobs:
  create_issue_branch:
    runs-on: ubuntu-latest
    outputs:
      branchName: ${{ steps.create_branch.outputs.branchName }}
    steps:
      - name: Generate Branch Name
        id: vars
        shell: bash
        env:
          # Access the native Issue Type name (e.g., "Bug", "Chore")
          RAW_TYPE: ${{ github.event.issue.issue_type.name }}
          RAW_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          # Handle the case where Type is not yet set on the issue
          # Default to 'bugfix' if RAW_TYPE is empty
          TYPE=$(echo "${RAW_TYPE:-bugfix}" | tr '[:upper:]' '[:lower:]')

          # URL-safe title formatting
          CLEAN_TITLE=$(echo "$RAW_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')

          echo "branch_name=${TYPE}/${ISSUE_NUM}-${CLEAN_TITLE}" >> $GITHUB_OUTPUT

      - name: Create Branch
        id: create_branch
        uses: robvanderleek/create-issue-branch@dfe19372d9a9198999c0fd8a81f0dbe00951afd9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create_draft_pr:
    needs: create_issue_branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Create Empty Commit
        env:
          BRANCH_NAME: ${{ needs.create_issue_branch.outputs.branchName }}
        run: |
          # 1. Configure the bot user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Fetch the newly created branch from the previous job
          git fetch origin $BRANCH_NAME

          # 3. Check out the branch (now that git knows it exists)
          git checkout $BRANCH_NAME

          # 4. Create and push the empty commit to allow PR creation
          git commit --allow-empty -m "Chore: start PR for issue #${{ github.event.issue.number }} [skip ci]"
          git push origin $BRANCH_NAME

      - name: Create Draft PR and Enable Auto-Merge
        env:
          # Using env vars is the most secure way to handle strings with spaces
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: "[#${{ github.event.issue.number }}] ${{ github.event.issue.title }}"
          BODY: "Closes #${{ github.event.issue.number }}"
          HEAD: ${{ needs.create_issue_branch.outputs.branchName }}
        run: |
          # 1. Create as Draft
          gh pr create --draft --title "$TITLE" --body "$BODY" --head "$HEAD" --base main

          # 2. Transition to "Ready for Review"
          gh pr ready "$HEAD"

          # 3. Now Auto-Merge can be enabled
          gh pr merge --auto --squash "$HEAD"
