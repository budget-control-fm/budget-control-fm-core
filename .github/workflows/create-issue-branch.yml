name: Create Issue Branch & Draft PR
on:
  issues:
    types: [assigned]

jobs:
  create_issue_branch:
    runs-on: ubuntu-latest
    outputs:
      branchName: ${{ steps.create_branch.outputs.branchName }}
    steps:
      - name: Generate Branch Name
        id: vars
        shell: bash
        # FIX: Move all untrusted GitHub context data into env variables
        env:
          RAW_TYPE: ${{ github.event.issue.issue_type.name }}
          RAW_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          # 1. Handle Issue Type (Default to 'task' if empty)
          # Convert to lowercase (e.g., 'Bug' -> 'bug')
          TYPE=$(echo "${RAW_TYPE:-task}" | tr '[:upper:]' '[:lower:]')

          # 2. Clean the title for a URL-safe branch name
          # Lowercase, replace non-alphanumeric with '-', trim extra hyphens
          CLEAN_TITLE=$(echo "$RAW_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')

          # 3. Combine: type/number-title
          BRANCH_NAME="${TYPE}/${ISSUE_NUM}-${CLEAN_TITLE}"

          # Output for next steps
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create Branch
        id: create_branch
        uses: robvanderleek/create-issue-branch@dfe19372d9a9198999c0fd8a81f0dbe00951afd9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create_draft_pr:
    needs: create_issue_branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Create Empty Commit
        env:
          BRANCH_NAME: ${{ needs.create_issue_branch.outputs.branchName }}
        run: |
          # 1. Configure the bot user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Fetch the newly created branch from the previous job
          git fetch origin $BRANCH_NAME

          # 3. Check out the branch (now that git knows it exists)
          git checkout $BRANCH_NAME

          # 4. Create and push the empty commit to allow PR creation
          git commit --allow-empty -m "Chore: start PR for issue #${{ github.event.issue.number }}"
          git push origin $BRANCH_NAME

      - name: Create Draft PR
        # FIX: Assign untrusted data to env variables first
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BRANCH_NAME: ${{ needs.create_issue_branch.outputs.branchName }}
        run: |
          gh pr create \
            --draft \
            "[#$ISSUE_NUMBER] $ISSUE_TITLE" \
            --body "Closes #$ISSUE_NUMBER" \
            --head "$BRANCH_NAME" \
            --base main
