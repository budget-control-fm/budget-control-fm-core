name: Create Issue Branch & Draft PR
on:
  issues:
    types: [assigned]

jobs:
  create_issue_branch:
    runs-on: ubuntu-latest
    outputs:
      branchName: ${{ steps.create_branch.outputs.branchName }}
    steps:
      - name: Create Branch
        id: create_branch
        uses: robvanderleek/create-issue-branch@dfe19372d9a9198999c0fd8a81f0dbe00951afd9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create_draft_pr:
    needs: create_issue_branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Create Empty Commit
        env:
          BRANCH_NAME: ${{ needs.create_issue_branch.outputs.branchName }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout $BRANCH_NAME
          git commit --allow-empty -m "Chore: start PR for issue #${{ github.event.issue.number }}"
          git push origin $BRANCH_NAME

      - name: Create Draft PR
        # FIX: Assign untrusted data to env variables first
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BRANCH_NAME: ${{ needs.create_issue_branch.outputs.branchName }}
        run: |
          gh pr create \
            --draft \
            --title "$ISSUE_TITLE" \
            --body "Closes #$ISSUE_NUMBER" \
            --head "$BRANCH_NAME" \
            --base main
