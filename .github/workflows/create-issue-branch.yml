name: Create Issue Branch & Draft PR
on:
  issues:
    types: [assigned]

jobs:
  create_issue_branch:
    runs-on: ubuntu-latest
    outputs:
      branchName: ${{ steps.create_branch.outputs.branchName }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Generate Branch Name
        id: vars
        shell: bash
        env:
          # Capture all possible metadata
          RAW_TYPE: ${{ github.event.issue.issue_type.name }}
          RAW_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          # Sanitize the title to create a valid branch name
          SANITIZED_TITLE=$(echo "$RAW_TITLE" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9- ' | tr ' ' '-')
          BRANCH_NAME="issue-${ISSUE_NUM}-${SANITIZED_TITLE}"
          echo "Generated branch name: $BRANCH_NAME"
          echo "branchName=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create Branch
        id: create_branch
        uses: robvanderleek/create-issue-branch@dfe19372d9a9198999c0fd8a81f0dbe00951afd9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create_draft_pr:
    needs: create_issue_branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Create Draft PR and Enable Auto-Merge
        env:
          # Using env vars is the most secure way to handle strings with spaces
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: "[#${{ github.event.issue.number }}] ${{ github.event.issue.title }}"
          BODY: "Closes #${{ github.event.issue.number }}"
          HEAD: ${{ needs.create_issue_branch.outputs.branchName }}
        run: |
          # Create the PR first
          gh pr create \
            --draft \
            --title "$TITLE" \
            --body "$BODY" \
            --head "$HEAD" \
            --base main
