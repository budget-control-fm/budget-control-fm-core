name: Open Pull Request

on:
  workflow_run:
    workflows:
      - Pre-flight
    types:
      - completed
    branches:
      - feature/**
      - fix/**
      - hotfix/**
      - chore/**
      - docs/**

jobs:
  open_pr:
    name: Open Pull Request
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ github.event.workflow_run.head_branch }}" \
            --title "${{ github.event.workflow_run.head_branch }}" \
            --body "Pre-flight checks passed. Code is ready for review." \
          || echo "PR already exists, skipping."
