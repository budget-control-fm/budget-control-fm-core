name: Cleanup on Issue Close
on:
  issues:
    types: [closed]

jobs:
  cleanup_resources:
    runs-on: ubuntu-latest
    steps:
      - name: Close PR and Delete Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          # Use the built-in variable to get owner/repo
          REPO: ${{ github.repository }}
        run: |
          # 1. Find the PR (Adding --repo is the key fix)
          PR_DATA=$(gh pr list --repo "$REPO" --search "Closes #$ISSUE_NUM" --json number,headRefName --jq '.[0]')

          if [ "$PR_DATA" != "null" ] && [ -n "$PR_DATA" ]; then
            PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number')
            BRANCH_NAME=$(echo "$PR_DATA" | jq -r '.headRefName')

            echo "Found PR #$PR_NUMBER with branch $BRANCH_NAME"

            # 2. Close the PR (Explicitly targeting the repo)
            gh pr close "$PR_NUMBER" --repo "$REPO" --comment "Closing PR as the associated issue #$ISSUE_NUM was closed."

            # 3. Delete the remote branch via API
            gh api -X DELETE "repos/$REPO/git/refs/heads/$BRANCH_NAME"
          else
            echo "No linked PR found for issue #$ISSUE_NUM"
          fi
